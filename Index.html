<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <title>Timetable Viewer</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Loading screen ────────────────────────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      color: #666;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #ddd;
      border-top-color: #4a6fa5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error state ───────────────────────────────────────────────────────── */
    #error {
      display: none;
      margin: 40px auto;
      max-width: 500px;
      padding: 20px;
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      color: #c62828;
    }

    /* ── Main layout ───────────────────────────────────────────────────────── */
    #app { display: none; padding: 16px; }

    /* ── Controls bar ──────────────────────────────────────────────────────── */
    #controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    #controls h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      white-space: nowrap;
    }

    select {
      padding: 6px 10px;
      border: 1px solid #ccd;
      border-radius: 6px;
      background: white;
      font-size: 13px;
      color: #1a1a2e;
      cursor: pointer;
      appearance: auto;
    }
    select:focus { outline: 2px solid #4a6fa5; outline-offset: 1px; }

    /* Semester toggle */
    .toggle {
      display: flex;
      border: 1px solid #ccd;
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle button {
      padding: 6px 14px;
      border: none;
      background: white;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle button:not(:last-child) { border-right: 1px solid #ccd; }
    .toggle button.active {
      background: #4a6fa5;
      color: white;
      font-weight: 600;
    }
    .toggle button:not(.active):hover { background: #f0f2f5; }

    /* ── Grid wrapper ──────────────────────────────────────────────────────── */
    #grid-wrapper {
      overflow-x: auto;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* ── Timetable table ───────────────────────────────────────────────────── */
    table.timetable {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
      background: white;
    }

    /* Header rows */
    table.timetable thead th {
      background: #1a1a2e;
      color: white;
      font-weight: 600;
      text-align: center;
      padding: 8px 4px;
    }
    table.timetable thead th.week-header {
      font-size: 14px;
      letter-spacing: 0.04em;
      padding: 10px 4px;
    }
    table.timetable thead th.day-header {
      font-size: 12px;
      color: #aab;
      font-weight: 500;
      padding: 6px 4px;
    }
    /* Period label column header */
    table.timetable thead th.corner { background: #111; }

    /* Visual separator between Week A and Week B */
    .week-sep {
      width: 8px;
      background: #e8eaf0 !important;
      padding: 0 !important;
      border: none !important;
    }

    /* Period label cells */
    td.period-label {
      background: #f7f8fa;
      border-right: 2px solid #e0e2ea;
      padding: 8px 12px;
      text-align: right;
      white-space: nowrap;
      vertical-align: middle;
      min-width: 88px;
    }
    td.period-label .period-name {
      font-weight: 600;
      font-size: 13px;
      color: #1a1a2e;
    }
    td.period-label .period-time {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }

    /* Data cells */
    td.grid-cell {
      border: 1px solid #e8eaf0;
      vertical-align: stretch;
      padding: 0;
      min-width: 80px;
    }
    td.grid-cell.empty { background: #fafbfc; }

    /* Slot container — horizontal flex for sub-group splits */
    .slot-row {
      display: flex;
      flex-direction: row;
      height: 100%;
      min-height: 80px;
    }

    /* Individual slot (one subject/sub-group) */
    .slot {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 5px 6px;
      border-right: 1px solid rgba(0,0,0,0.06);
      overflow: hidden;
      min-width: 0;
    }
    .slot:last-child { border-right: none; }

    .slot-subject {
      font-weight: 700;
      font-size: 12px;
      line-height: 1.2;
      color: rgba(0,0,0,0.82);
      word-break: break-word;
    }

    .slot-detail {
      font-size: 10px;
      color: rgba(0,0,0,0.6);
      line-height: 1.4;
      margin-top: 3px;
    }

    .slot-subgroups {
      font-size: 9px;
      color: rgba(0,0,0,0.45);
      margin-top: 4px;
      font-style: italic;
    }

    /* Week separator column */
    td.week-sep-cell {
      width: 8px;
      background: #e8eaf0;
      border: none;
      padding: 0;
    }

    /* Alternating row shading */
    tbody tr:nth-child(even) td.period-label { background: #f0f2f7; }

    /* ── Legend ────────────────────────────────────────────────────────────── */
    #legend {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 12px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #333;
    }
    .legend-swatch {
      width: 14px; height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Loading state -->
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading timetable data…</div>
  </div>

  <!-- Error state -->
  <div id="error"></div>

  <!-- Main app (hidden until data loads) -->
  <div id="app">
    <div id="controls">
      <h1>Timetable Viewer</h1>

      <div class="control-group">
        <label for="tg-select">Travelling group</label>
        <select id="tg-select"></select>
      </div>

      <div class="control-group">
        <label>Semester</label>
        <div class="toggle">
          <button id="btn-s1" class="active" onclick="setSemester('S1')">Semester 1</button>
          <button id="btn-s2" onclick="setSemester('S2')">Semester 2</button>
        </div>
      </div>
    </div>

    <div id="grid-wrapper">
      <table class="timetable" id="timetable"></table>
    </div>

    <div id="legend"></div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    let timetableData = null;
    let currentTg     = null;
    let currentSem    = 'S1';

    // ── Subject colour map ────────────────────────────────────────────────────
    // Curated colours for known subjects; unknown subjects get a generated hue.
    const SUBJECT_COLOURS = {
      // Sciences — greens
      'SCI':   '#a5d6a7', 'BIO': '#80c784', 'CHE': '#66bb6a',
      'PHY':   '#4caf50', 'ESS': '#81c784',
      // Mathematics — blues
      'MAT':   '#90caf9', 'MATSt': '#64b5f6', 'MATEx': '#42a5f5',
      'MAA':   '#2196f3', 'MAI': '#1976d2',
      // English — ambers
      'EngLL': '#ffcc80', 'EngLA': '#ffb74d',
      // Korean — oranges/reds
      'KorLL': '#ff8a65', 'KorLA': '#ff7043', 'KAH': '#e64a19',
      // Chinese — pinks/roses
      'ChiLL': '#f48fb1', 'ChiLi': '#f06292',
      // Other languages
      'SSST':  '#ce93d8', 'Pam': '#ab47bc',
      // Humanities — purples
      'HUM':   '#ce93d8', 'HIS': '#ba68c8', 'GEO': '#ab47bc',
      'ECO':   '#9c27b0', 'BUS': '#7b1fa2', 'PSY': '#6a1b9a',
      // Arts — teals/cyans
      'MUS':   '#80deea', 'VIS': '#4dd0e1', 'DAN': '#26c6da',
      'THE':   '#00acc1', 'FILM': '#00838f',
      // PHE & sport — greens/teals
      'PHE':   '#a5d6a7', 'PHEICE': '#4db6ac', 'SEH': '#80cbc4',
      // Design — browns/ochres
      'DES':   '#ffcc80', 'DTEC': '#ffa726', 'PRO': '#fb8c00',
      'ROB':   '#f57c00', 'DMD': '#e65100', 'ENT': '#ffb300',
      // Core / advisory / TOK
      'TOK':   '#ef9a9a', 'COR': '#e0e0e0', 'ADV': '#eeeeee',
      'STU':   '#f5f5f5', 'Protect': '#f5f5f5',
      'Collab Time': '#e8eaf6',
    };

    /**
     * Returns a background colour for a given subject short code.
     * Falls back to a deterministic hue derived from the string.
     *
     * @param {string} short Subject short code (e.g. 'SCI', 'MAT')
     * @returns {string} CSS colour string
     */
    function subjectColour(short) {
      if (SUBJECT_COLOURS[short]) return SUBJECT_COLOURS[short];
      // Deterministic hash → hue so the same subject always gets the same colour.
      let hash = 0;
      for (let i = 0; i < short.length; i++) {
        hash = short.charCodeAt(i) + ((hash << 5) - hash);
      }
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue}, 55%, 78%)`;
    }

    // ── Initialisation ────────────────────────────────────────────────────────

    /**
     * Fetches timetable data from the Apps Script backend.
     * Falls back to window.__MOCK_DATA__ when running outside Apps Script
     * (useful during local development).
     */
    function init() {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(onDataLoaded)
          .withFailureHandler(onError)
          .getTimetableData();
      } else if (window.__MOCK_DATA__) {
        onDataLoaded(window.__MOCK_DATA__);
      } else {
        onError({ message: 'Not running inside Apps Script and no mock data found.' });
      }
    }

    /**
     * Called when data arrives from the backend.
     * Populates the selector and renders the initial grid.
     *
     * @param {Object} data  { travellingGroups, grids }
     */
    function onDataLoaded(data) {
      timetableData = data;

      // Populate the travelling group dropdown.
      const select = document.getElementById('tg-select');
      select.innerHTML = '';

      // Group by grade for optgroup organisation.
      const byGrade = {};
      data.travellingGroups.forEach(tg => {
        const grade = tg.label.replace(/[^\d].*/, ''); // first number
        if (!byGrade[grade]) byGrade[grade] = [];
        byGrade[grade].push(tg);
      });

      Object.keys(byGrade).sort((a, b) => parseInt(a) - parseInt(b)).forEach(grade => {
        const og = document.createElement('optgroup');
        og.label = `Grade ${grade}`;
        byGrade[grade].forEach(tg => {
          const opt = document.createElement('option');
          opt.value = tg.id;
          opt.textContent = `${tg.label}  (${tg.className})`;
          og.appendChild(opt);
        });
        select.appendChild(og);
      });

      select.addEventListener('change', () => {
        currentTg = timetableData.travellingGroups.find(t => t.id === select.value);
        renderGrid();
      });

      // Select the first travelling group by default.
      currentTg = data.travellingGroups[0];
      if (currentTg) select.value = currentTg.id;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderGrid();
    }

    /** Displays an error message. */
    function onError(err) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error');
      el.style.display = 'block';
      el.textContent = 'Error loading timetable: ' + (err.message || JSON.stringify(err));
    }

    // ── Semester toggle ───────────────────────────────────────────────────────

    /**
     * Switches the active semester and re-renders the grid.
     *
     * @param {'S1'|'S2'} sem
     */
    function setSemester(sem) {
      currentSem = sem;
      document.getElementById('btn-s1').classList.toggle('active', sem === 'S1');
      document.getElementById('btn-s2').classList.toggle('active', sem === 'S2');
      renderGrid();
    }

    // ── Grid rendering ────────────────────────────────────────────────────────

    const PERIOD_INFO = {
      1: { label: 'Period 1', time: '8:15–9:35' },
      2: { label: 'Period 2', time: '9:45–11:05' },
      3: { label: 'Period 3', time: '12:10–13:30' },
      4: { label: 'Period 4', time: '13:40–15:00' }
    };

    const DAYS = ['D1', 'D2', 'D3', 'D4', 'D5'];

    /**
     * Builds and inserts the full 10-day timetable grid for the current
     * travelling group and semester.
     */
    function renderGrid() {
      if (!currentTg || !timetableData) return;

      const grid = timetableData.grids[currentTg.id];
      if (!grid) return;

      const semData = grid[currentSem];
      const table   = document.getElementById('timetable');
      const usedSubjects = {};  // short → name, for legend

      // ── Build header ──────────────────────────────────────────────────────
      const thead = document.createElement('thead');

      // Row 1: Week labels spanning 5 day columns each.
      const weekRow = document.createElement('tr');
      weekRow.innerHTML = `
        <th class="corner" rowspan="2"></th>
        <th class="week-header" colspan="5">Week A</th>
        <th class="week-sep" rowspan="2"></th>
        <th class="week-header" colspan="5">Week B</th>
      `;
      thead.appendChild(weekRow);

      // Row 2: Individual day labels.
      const dayRow = document.createElement('tr');
      ['A', 'B'].forEach((week, wi) => {
        DAYS.forEach(day => {
          const th = document.createElement('th');
          th.className = 'day-header';
          th.textContent = day;
          dayRow.appendChild(th);
        });
        // Separator placeholder already handled by rowspan above; skip for B.
      });
      thead.appendChild(dayRow);

      // ── Build body ────────────────────────────────────────────────────────
      const tbody = document.createElement('tbody');

      for (let period = 1; period <= 4; period++) {
        const tr = document.createElement('tr');

        // Period label cell.
        const tdLabel = document.createElement('td');
        tdLabel.className = 'period-label';
        tdLabel.innerHTML = `
          <div class="period-name">${PERIOD_INFO[period].label}</div>
          <div class="period-time">${PERIOD_INFO[period].time}</div>
        `;
        tr.appendChild(tdLabel);

        ['A', 'B'].forEach((week, wi) => {
          // Insert visual separator before Week B.
          if (wi === 1) {
            const sep = document.createElement('td');
            sep.className = 'week-sep-cell';
            tr.appendChild(sep);
          }

          for (let day = 1; day <= 5; day++) {
            const slots = (semData && semData[week] && semData[week][day])
              ? semData[week][day][period]
              : [];

            const td = document.createElement('td');
            td.className = 'grid-cell' + (slots.length === 0 ? ' empty' : '');

            if (slots.length > 0) {
              const slotRow = document.createElement('div');
              slotRow.className = 'slot-row';

              slots.forEach(slot => {
                usedSubjects[slot.subjectShort] = slot.subject;

                const colour = subjectColour(slot.subjectShort);
                const div = document.createElement('div');
                div.className = 'slot';
                div.style.background = colour;

                // Sub-group label: only shown when the travelling group splits.
                const subGroupText = (slots.length > 1 && slot.subGroupNames.length > 0)
                  ? `<div class="slot-subgroups">${slot.subGroupNames.join(', ')}</div>`
                  : '';

                div.innerHTML = `
                  <div class="slot-subject">${slot.subjectShort}</div>
                  <div class="slot-detail">${slot.teacherShort}<br>${slot.roomShort}</div>
                  ${subGroupText}
                `;

                // Tooltip with full names on hover.
                div.title = [
                  slot.subject,
                  slot.teacher,
                  slot.room,
                  slot.subGroupNames.length ? `Groups: ${slot.subGroupNames.join(', ')}` : ''
                ].filter(Boolean).join('\n');

                slotRow.appendChild(div);
              });

              td.appendChild(slotRow);
            }

            tr.appendChild(td);
          }
        });

        tbody.appendChild(tr);
      }

      // Replace table contents.
      table.innerHTML = '';
      table.appendChild(thead);
      table.appendChild(tbody);

      renderLegend(usedSubjects);
    }

    /**
     * Renders a colour legend for all subjects appearing in the current grid.
     *
     * @param {Object} usedSubjects  Map of short code → full name
     */
    function renderLegend(usedSubjects) {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';

      Object.entries(usedSubjects)
        .sort((a, b) => a[1].localeCompare(b[1]))
        .forEach(([short, name]) => {
          const item = document.createElement('div');
          item.className = 'legend-item';
          item.innerHTML = `
            <div class="legend-swatch" style="background:${subjectColour(short)}"></div>
            <span><strong>${short}</strong> ${name}</span>
          `;
          legend.appendChild(item);
        });
    }

    // ── Start ─────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
